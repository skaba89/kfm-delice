version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: kfm_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kfm_secure_password_2024}
      POSTGRES_DB: kfm_delice
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kfm_admin -d kfm_delice"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kfm_admin:${POSTGRES_PASSWORD:-kfm_secure_password_2024}@postgres:5432/kfm_delice?schema=public
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  postgres_data:
